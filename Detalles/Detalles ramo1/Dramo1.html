<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle - Florería Alberto</title>
    <link rel="stylesheet" href="../css/detalles.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" class="btn-back">← Volver al Catálogo</a>
        
        <section class="product-detail">
            <div class="image-gallery">
                <img src="../img/ramo-principal.jpg" id="main-img" alt="Ramo">
            </div>

            <div class="info-panel">
                <span class="category">Arreglos Premium</span>
                <h1>Ramo Elegancia Real</h1>
                <p class="price">$550.00</p>
                <div class="description">
                    <p>Símbolo máximo de amor y elegancia. Este arreglo incluye rosas seleccionadas a mano, follaje fino y un acabado artesanal único.</p>
                </div>
                
                <div class="actions">
                    <button class="btn-buy" onclick="agregarAlCarrito()">Agregar al Carrito</button>
                    <p class="shipping-info">🚚 Envío disponible para hoy mismo</p>
                </div>
            </div>
        </section>
    </div>

    <script src="../js/detalles.js"></script>
</body>
</html>
