<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | Concept</title>
    <!-- Fuente: Unbounded (muy moderna y ancha) -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <div class="container">
        <div class="product-grid">
            <!-- Bloque de Imagen con Marco Grueso -->
            <div class="image-card">
                <img src="ramo.jpg" alt="Ramo Elegancia Real">
                <div class="label-vertical">LIMITED EDITION</div>
            </div>

            <!-- Bloque de Texto Estilo Poster -->
            <div class="content-card">
                <div class="header">
                    <span class="id-number">#001 / 2024</span>
                    <h1>ELEGANCIA<br>REAL</h1>
                </div>

                <div class="price-bubble">
                    $550.00
                </div>

                <p class="description">
                    Un ensamble floral que desafía la tradición. Curaduría de rosas premium y elementos pop en una estructura de diseño único.
                </p>

                <footer class="footer-btns">
                    <button class="buy-now" id="action-btn">
                        COMPRAR AHORA
                    </button>
                    <div class="shipping-badge">ENVÍO HOY</div>
                </footer>
            </div>
        </div>
    </div>

    <script src="detalles.js"></script>
</body>
</html>
