<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | Editorial</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <section class="editorial-container">
        <!-- Fondo con el nombre en gigante (Marca de agua) -->
        <div class="bg-text">PREMIUM</div>

        <div class="editorial-wrapper">
            <!-- Columna de Imagen -->
            <div class="photo-column">
                <div class="image-box">
                    <img src="arreglo8.jpeg" alt="Ramo Elegancia Real" id="main-photo">
                </div>
            </div>

            <!-- Columna de Texto -->
            <div class="content-column">
                <header>
                    <span class="collection-name">Colección 2024</span>
                    <h1 class="main-title">Elegancia <br><span class="italic">Real</span></h1>
                </header>

                <div class="body-text">
                    <p class="description">Una oda a la sofisticación floral. Nuestro diseño insignia combina rosas de tallo largo con el encanto icónico de Hello Kitty en una pieza de coleccionista.</p>
                    
                    <div class="price-box">
                        <span class="tag">Inversión</span>
                        <span class="value">$550.00</span>
                    </div>
                </div>

                <div class="cta-area">
                    <button class="editorial-btn" id="order-btn">
                        <span class="btn-label">Hacer Pedido</span>
                        <span class="btn-line"></span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script src="detalles.js"></script>
</body>
</html>
