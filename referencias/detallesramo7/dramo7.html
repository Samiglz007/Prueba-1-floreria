<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | Bento Edition</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <div class="bento-grid">
        <!-- Bloque Principal: Imagen -->
        <div class="item main-img">
            <img src="ramo.jpg" alt="Ramo Hello Kitty">
            <div class="tag">Nuevo</div>
        </div>

        <!-- Bloque: Título y Precio -->
        <div class="item header">
            <h1>Elegancia Real</h1>
            <p class="price">$550.00</p>
        </div>

        <!-- Bloque: Detalle de Hello Kitty -->
        <div class="item detail">
            <span class="icon">🎀</span>
            <h3>Edición Sanrio</h3>
            <p>Detalle original de colección.</p>
        </div>

        <!-- Bloque: Envío -->
        <div class="item shipping">
            <span class="icon">🚀</span>
            <h3>Envío Express</h3>
            <p>Hoy mismo en tu puerta.</p>
        </div>

        <!-- Bloque: Acción / Botón -->
        <div class="item action" id="buy-btn">
            <span>Pedir Ahora</span>
            <div class="arrow">→</div>
        </div>
    </div>

    <script src="detalles.js"></script>
</body>
</html>
