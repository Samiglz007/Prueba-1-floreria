<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | The Apex Edition</title>
    <!-- Fuentes de Élite -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <!-- Fondo de gradiente animado -->
    <div class="mesh-gradient"></div>

    <main class="viewport">
        <section class="master-piece">
            
            <!-- Columna Visual: El Producto -->
            <div class="visual-stage">
                <div class="image-orb">
                    <img src="arreglo11.jpegalt="Ramo Elegancia Real" id="main-product">
                    <div class="glass-glare"></div>
                </div>
                <div class="floating-badge">ART PIECE N° 01</div>
            </div>

            <!-- Columna de Detalles: La Experiencia -->
            <div class="data-stage">
                <nav class="meta-data">
                    <span>BOUTIQUE EXCLUSIVE</span>
                    <span>/</span>
                    <span>2024 COLLECTION</span>
                </nav>

                <h1 class="grand-title">Elegancia<br><i>Real</i></h1>
                
                <div class="divider"></div>

                <p class="manifesto">
                    Una sinfonía botánica que redefine el concepto de obsequio. 
                    Cada pétalo es curado bajo estándares de alta costura floral.
                </p>

                <div class="purchase-core">
                    <div class="price-tag">
                        <span class="currency">$</span>
                        <span class="amount">550.00</span>
                    </div>

                    <button class="hyper-btn" id="btn">
                        <span class="btn-text">ADQUIRIR AHORA</span>
                        <div class="btn-glow"></div>
                    </button>
                </div>

                <div class="trust-footer">
                    <span>ENTREGA PRIORITARIA INCLUIDA</span>
                </div>
            </div>

        </section>
    </main>

    <script src="detalles.js"></script>
</body>
</html>
