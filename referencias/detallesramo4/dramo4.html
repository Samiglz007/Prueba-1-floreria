<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | Pop Edition</title>
    <!-- Fuente: Space Grotesk (Muy moderna y tecnológica) -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <div class="glass-container">
        <!-- Elementos decorativos de fondo -->
        <div class="blob"></div>
        
        <main class="product-glass-card">
            <div class="image-wrapper">
                <img src="/Ramos/ramo4.jpeg" alt="Ramo Hello Kitty" class="floating-img">
            </div>

            <div class="content-wrapper">
                <div class="top-info">
                    <span class="stock-badge">Solo 3 disponibles</span>
                    <h1 class="main-title">Elegancia <br><strong>Real</strong></h1>
                </div>

                <p class="description">
                    Un diseño disruptivo para quienes no se conforman con lo común. Rosas vibrantes y la ternura de Sanrio en una composición única.
                </p>

                <div class="action-zone">
                    <div class="price-pill">
                        <span class="price-val">$550</span>
                    </div>
                    <button class="add-button" id="main-btn">
                        <span class="btn-text">¡Lo quiero!</span>
                        <div class="sparkles">✨</div>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="detalles.js"></script>
</body>
</html>
