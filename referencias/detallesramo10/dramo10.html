<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | The Masterpiece</title>
    <!-- Fuentes de ultra-lujo -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <div class="luxury-viewport">
        <!-- Fondo Dinámico -->
        <div class="noise-overlay"></div>
        <div class="gradient-sphere"></div>

        <main class="experience-card">
            <!-- Sección Visual Izquierda -->
            <div class="visual-engine">
                <div class="image-container">
                    <img src="ramo.jpg" alt="Masterpiece" id="hero-img">
                    <div class="glass-reflection"></div>
                </div>
                <div class="floating-data">
                    <span>SKU: ER-2024-HK</span>
                    <span>FLORES: ROSAS SELECCIÓN</span>
                </div>
            </div>

            <!-- Sección de Información Derecha -->
            <div class="content-engine">
                <nav class="top-nav">
                    <span>ARCHIVE / 01</span>
                    <span>BOUTIQUE EXCLUSIVA</span>
                </nav>

                <div class="main-info">
                    <h2 class="pre-title">Arreglo Artesanal</h2>
                    <h1 class="hero-title">Elegancia <br><i>Real</i></h1>
                    <p class="manifesto">
                        Una colisión entre la sofisticación botánica y el icono pop. Creado para quienes entienden que el lujo también puede ser tierno.
                    </p>
                </div>

                <div class="purchase-zone">
                    <div class="price-display">
                        <span class="label">Valor Estético</span>
                        <span class="value">$550.00 <small>MXN</small></span>
                    </div>

                    <button class="magnetic-btn" id="cta">
                        <span class="btn-bg"></span>
                        <span class="btn-text">RESERVAR PIEZA</span>
                    </button>
                </div>

                <div class="scroll-indicator">
                    <div class="line"></div>
                    <span>EXPLORAR DETALLES</span>
                </div>
            </div>
        </main>
    </div>

    <script src="detalles.js"></script>
</body>
</html>
