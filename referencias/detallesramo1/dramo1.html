<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Flora - Elegancia Real</title>
    <!-- Fuentes elegantes -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <main class="container">
        <article class="card">
            <!-- Sección Imagen -->
            <section class="card-image">
                <div class="badge">Edición Especial</div>
                <img src="/ramos/ramo1.jpeg" alt="Ramo Elegancia Real Hello Kitty" id="main-img">
            </section>

            <!-- Sección Contenido -->
            <section class="card-content">
                <header>
                    <span class="category">Arreglos Premium</span>
                    <h1>Ramo Elegancia Real</h1>
                </header>

                <div class="description">
                    <p>Una fusión magistral de ternura y sofisticación. Rosas premium seleccionadas a mano, acompañadas de follaje exótico y el detalle icónico de Hello Kitty.</p>
                </div>

                <div class="price-tag">
                    <span class="symbol">$</span>
                    <span class="value">550</span>
                    <span class="decimal">.00</span>
                </div>

                <div class="features">
                    <div class="feature-item">
                        <span class="icon">✨</span>
                        <span>Acabado Artesanal</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">🚚</span>
                        <span>Envío Express Hoy</span>
                    </div>
                </div>

                <button class="btn-buy" id="btn-cart">
                    <span class="btn-text">Agregar al Carrito</span>
                    <div class="btn-icon">🛒</div>
                </button>
            </section>
        </article>
    </main>

    <script src="detalles.js"></script>
</body>
</html>
