<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegancia Real | 3D Experience</title>
    <!-- Fuentes: Cinzel para un toque Real y Montserrat para modernidad -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="detalles.css">
</head>
<body>

    <div class="scene">
        <div class="card-3d">
            <!-- Capa de Fondo -->
            <div class="card-bg"></div>
            
            <!-- Capa de la Imagen (Parece salir de la tarjeta) -->
            <div class="image-layer">
                <img src="arreglo6.jpeg" alt="Ramo Hello Kitty">
            </div>

            <!-- Capa de Información -->
            <div class="info-layer">
                <h1 class="title">Elegancia <br><span>Real</span></h1>
                <div class="price-pill">$550.00</div>
                <p class="summary">La perfección floral convertida en arte. Un regalo que trasciende el momento.</p>
                
                <button class="glass-btn" id="buy-btn">
                    <span>Añadir a mi vida</span>
                </button>
            </div>
            
            <!-- Elemento Decorativo Flotante -->
            <div class="floating-circle"></div>
        </div>
    </div>

    <script src="detalles.js"></script>
</body>
</html>
