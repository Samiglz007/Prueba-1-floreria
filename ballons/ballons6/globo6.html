<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Experience | Balloons</title>
    <link rel="stylesheet" href="dglobo6.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <main class="viewport">
        <!-- Fondo con el nombre del producto en grande -->
        <div class="bg-text">PREMIUM</div>

        <section class="product-layout">
            <!-- Bloque de Imagen Flotante -->
            <div class="image-wrapper">
                <img src="dglobo.jpeg" alt="Globo de Lujo">
                <div class="floating-card">
                    <span>Precio</span>
                    <p>$59.00</p>
                </div>
            </div>

            <!-- Bloque de Contenido Desplazado -->
            <div class="content-box">
                <header>
                    <span class="category">Edición de Lujo</span>
                    <h1>Burbuja <br><span>Galaxy</span></h1>
                </header>

                <div class="description">
                    <p>No es solo un globo, es una experiencia visual. Diseñado con pigmentos orgánicos y helio de alta pureza para una flotabilidad garantizada de 10 días.</p>
                </div>

                <div class="specs-horizontal">
                    <div class="spec"><strong>XL</strong><span>Tamaño</span></div>
                    <div class="spec"><strong>BIO</strong><span>Material</span></div>
                    <div class="spec"><strong>24h</strong><span>Entrega</span></div>
                </div>

                <div class="cta-section">
                    <a href="https://wa.me" class="btn-main">
                        LO QUIERO AHORA
                        <span class="btn-icon">→</span>
                    </a>
                </div>
            </div>
        </section>

        <!-- Navegación Minimal -->
        <a href="index.html" class="close-btn">CERRAR</a>
    </main>

</body>
</html>
