<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Exclusivo | Magic Balloons</title>
    <link rel="stylesheet" href="dglobo.css">
</head>
<body>

    <div class="background-glow"></div>

    <main class="bento-container">
        <!-- Lado Izquierdo: Imagen Hero -->
        <div class="bento-item main-image">
            <img src="dglobo.jpeg" alt="Globo">
            <div class="overlay-tag">Edición Especial</div>
        </div>

        <!-- Lado Derecho: Info y Cuadrícula -->
        <div class="bento-info">
            <div class="bento-item header-card">
                <h1>Aura de Oro</h1>
                <p class="price">$49.00</p>
            </div>

            <div class="small-cards">
                <div class="bento-item mini-card">
                    <span>🎈</span>
                    <p>Helio Premium</p>
                </div>
                <div class="bento-item mini-card">
                    <span>⏳</span>
                    <p>7-10 Días</p>
                </div>
            </div>

            <div class="bento-item description-card">
                <h3>Detalles del Diseño</h3>
                <p>Arreglo artesanal con globos de doble capa y acabado espejo. Incluye una base de micro-globos y cinta de seda italiana.</p>
            </div>

            <a href="#" class="bento-item cta-card">
                <span>Pedir por WhatsApp</span>
                <div class="arrow">→</div>
            </a>
        </div>
    </main>

</body>
</html>
